<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Bible Kids Adventure</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      color: #2f3a2d;
      background-color: #9fd3df;
      overflow-x: hidden;
    }

    .game-screen {
      position: relative;
      min-height: 100vh;
      overflow: hidden;

      background:
        linear-gradient(
          to bottom,
          #9fd8e8 0%,
          #d8eee5 48%,
          #9ac96d 49%,
          #65984f 100%
        );

      transition:
        transform 1.2s ease,
        filter 1.2s ease;
    }

    .sun {
      position: absolute;
      top: 55px;
      left: 8%;
      width: 100px;
      height: 100px;

      border: 5px solid #d69838;
      border-radius: 50%;

      background-color: #f6cb62;
    }

    .cloud {
      position: absolute;
      width: 160px;
      height: 45px;

      border-radius: 60px;

      background-color: rgba(255, 255, 255, 0.88);
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;

      border-radius: 50%;

      background-color: inherit;
    }

    .cloud::before {
      width: 65px;
      height: 65px;
      left: 22px;
      top: -28px;
    }

    .cloud::after {
      width: 80px;
      height: 80px;
      right: 18px;
      top: -40px;
    }

    .cloud-one {
      top: 100px;
      right: 17%;
      transform: rotate(2deg);
    }

    .cloud-two {
      top: 220px;
      left: 15%;
      transform: scale(0.7) rotate(-2deg);
    }

    .mountain {
      position: absolute;
      bottom: 31%;

      width: 0;
      height: 0;

      border-left: 300px solid transparent;
      border-right: 300px solid transparent;
      border-bottom: 330px solid #6d8765;
    }

    .mountain-left {
      left: -180px;
    }

    .mountain-right {
      right: -190px;
      border-bottom-color: #607a5c;
    }

    .hill {
      position: absolute;
      bottom: -150px;

      width: 850px;
      height: 430px;

      border-radius: 50%;

      background-color: #6ea14e;
    }

    .hill-left {
      left: -330px;
      transform: rotate(5deg);
    }

    .hill-right {
      right: -330px;
      transform: rotate(-5deg);

      background-color: #5f9348;
    }

    .path {
      position: absolute;
      left: 50%;
      bottom: -120px;

      width: 250px;
      height: 520px;

      background-color: #d8bc83;

      transform: translateX(-50%);

      clip-path: polygon(
        42% 0,
        58% 0,
        100% 100%,
        0 100%
      );
    }

    .logo {
      position: absolute;
      top: 28px;
      right: 34px;
      z-index: 20;

      width: 230px;
      padding: 12px 16px;

      border: 4px solid #60452c;
      border-radius: 14px 9px 15px 10px;

      background-color: #f4df9e;

      box-shadow: 6px 7px 0 rgba(62, 45, 29, 0.28);

      transform: rotate(1deg);
    }

    .logo-small {
      display: block;

      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 2px;

      color: #6e4b2d;
    }

    .logo-big {
      display: block;

      margin-top: 3px;

      font-size: 31px;
      font-weight: bold;
      line-height: 0.95;

      color: #7d4723;

      text-shadow: 2px 2px 0 #f6c65d;
    }

    .content {
      position: relative;
      z-index: 10;

      width: min(92%, 760px);

      margin: 0 auto;
      padding-top: 180px;

      text-align: center;
    }

    .main-title {
      margin: 0;

      font-size: clamp(46px, 8vw, 78px);
      line-height: 0.95;

      color: #5d3d25;

      text-shadow:
        3px 3px 0 #f1d47d,
        6px 6px 0 rgba(64, 45, 30, 0.16);
    }

    .tagline {
      max-width: 580px;

      margin: 24px auto 18px;

      font-family: Arial, sans-serif;
      font-size: clamp(19px, 3vw, 27px);
      font-weight: bold;
      line-height: 1.4;

      color: #294536;
    }

    .language-label {
      margin-top: 32px;
      margin-bottom: 15px;

      font-family: Arial, sans-serif;
      font-size: 18px;
      font-weight: bold;
    }

    .language-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;

      gap: 18px;
    }

    .language-button,
    .start-button {
      border: 4px solid #563e28;

      font-family: Arial, sans-serif;
      font-weight: bold;

      cursor: pointer;

      transition:
        transform 0.16s ease,
        box-shadow 0.16s ease,
        background-color 0.16s ease;
    }

    .language-button {
      min-width: 165px;

      padding: 15px 25px;

      border-radius: 8px 14px 9px 12px;

      background-color: #dfad5d;

      box-shadow: 5px 6px 0 #563e28;

      color: #382a1e;
      font-size: 19px;
    }

    .language-button:hover {
      transform: translateY(-4px) rotate(-1deg);

      box-shadow: 7px 9px 0 #563e28;
    }

    .language-button.selected {
      background-color: #fff0b4;

      outline: 5px solid rgba(255, 255, 255, 0.65);
    }

    .welcome-message {
      min-height: 32px;

      margin: 26px 0 15px;

      font-family: Arial, sans-serif;
      font-size: 20px;
      font-weight: bold;

      color: #2b4335;
    }

    .start-button {
      display: none;

      margin: 10px auto 0;

      padding: 17px 36px;

      border-radius: 13px 8px 14px 9px;

      background-color: #cc6845;

      box-shadow: 6px 7px 0 #563e28;

      color: white;
      font-size: 21px;
    }

    .start-button:hover {
      transform: translateY(-4px) scale(1.02);

      box-shadow: 8px 10px 0 #563e28;
    }

    .small-character {
      position: absolute;
      left: 50%;
      bottom: 70px;
      z-index: 9;

      width: 80px;
      height: 150px;

      transform: translateX(-50%);
    }

    .character-head {
      width: 52px;
      height: 52px;

      margin: 0 auto;

      border: 4px solid #4b3425;
      border-radius: 50%;

      background-color: #d59b68;
    }

    .character-body {
      width: 68px;
      height: 76px;

      margin: -2px auto 0;

      border: 4px solid #4b3425;
      border-radius: 18px 18px 8px 8px;

      background-color: #4e7f94;
    }

    .character-legs {
      display: flex;
      justify-content: center;

      gap: 8px;

      margin-top: -2px;
    }

    .leg {
      width: 16px;
      height: 38px;

      border: 4px solid #4b3425;
      border-top: none;

      background-color: #654b39;
    }

    body::after {
      content: "";

      position: fixed;
      inset: 0;
      z-index: 999;

      pointer-events: none;

      background-color: #fff4c9;

      opacity: 0;

      transition: opacity 1.2s ease;
    }

    body.leaving::after {
      opacity: 1;
    }

    body.leaving .game-screen {
      transform: scale(1.12);

      filter:
        brightness(1.3)
        blur(2px);
    }

    body.leaving .small-character {
      animation: walkForward 1.2s ease forwards;
    }

    @keyframes walkForward {
      0% {
        transform:
          translateX(-50%)
          translateY(0)
          scale(1);
      }

      100% {
        transform:
          translateX(-50%)
          translateY(-120px)
          scale(0.6);
      }
    }

    @media (max-width: 760px) {
      .logo {
        top: 18px;
        right: 16px;

        width: 170px;
      }

      .logo-big {
        font-size: 23px;
      }

      .content {
        padding-top: 155px;
      }

      .main-title {
        font-size: 48px;
      }

      .sun {
        width: 75px;
        height: 75px;

        top: 35px;
        left: 5%;
      }

      .cloud-one {
        right: -45px;
      }

      .small-character {
        bottom: 35px;

        transform:
          translateX(-50%)
          scale(0.8);
      }
    }
  </style>
</head>

<body>

  <main class="game-screen">

    <div class="sun"></div>

    <div class="cloud cloud-one"></div>
    <div class="cloud cloud-two"></div>

    <div class="mountain mountain-left"></div>
    <div class="mountain mountain-right"></div>

    <div class="hill hill-left"></div>
    <div class="hill hill-right"></div>

    <div class="path"></div>

    <div class="logo">
      <span class="logo-small">BIBLE KIDS</span>
      <span class="logo-big">ADVENTURE</span>
    </div>

    <section class="content">

      <h1 class="main-title">
        Begin Your Journey
      </h1>

      <p
        class="tagline"
        id="tagline"
      >
        Explore the Bible and discover a world of faith,
        courage and adventure.
      </p>

      <p
        class="language-label"
        id="languageLabel"
      >
        Choose your language · 請選擇語言
      </p>

      <div class="language-buttons">

        <button
          class="language-button"
          id="englishButton"
          onclick="chooseLanguage('en')"
        >
          English
        </button>

        <button
          class="language-button"
          id="cantoneseButton"
          onclick="chooseLanguage('zh-HK')"
        >
          廣東話
        </button>

      </div>

      <p
        class="welcome-message"
        id="welcomeMessage"
      ></p>

      <button
        class="start-button"
        id="startButton"
        onclick="startAdventure()"
      >
        Start Adventure
      </button>

    </section>

    <div
      class="small-character"
      aria-hidden="true"
    >
      <div class="character-head"></div>

      <div class="character-body"></div>

      <div class="character-legs">
        <div class="leg"></div>
        <div class="leg"></div>
      </div>
    </div>

  </main>

  <script>
    let selectedLanguage = "";

    function chooseLanguage(language) {
      selectedLanguage = language;

      const englishButton =
        document.getElementById("englishButton");

      const cantoneseButton =
        document.getElementById("cantoneseButton");

      const tagline =
        document.getElementById("tagline");

      const languageLabel =
        document.getElementById("languageLabel");

      const welcomeMessage =
        document.getElementById("welcomeMessage");

      const startButton =
        document.getElementById("startButton");

      englishButton.classList.remove("selected");
      cantoneseButton.classList.remove("selected");

      if (language === "en") {
        document.documentElement.lang = "en";

        englishButton.classList.add("selected");

        tagline.textContent =
          "Explore the Bible and discover a world of faith, courage and adventure.";

        languageLabel.textContent =
          "Choose your language";

        welcomeMessage.textContent =
          "Welcome, young explorer.";

        startButton.textContent =
          "Start Adventure";
      } else {
        document.documentElement.lang = "zh-HK";

        cantoneseButton.classList.add("selected");

        tagline.textContent =
          "探索聖經，發現一個充滿信心、勇氣同冒險嘅世界。";

        languageLabel.textContent =
          "請選擇語言";

        welcomeMessage.textContent =
          "歡迎你，小小探險家。";

        startButton.textContent =
          "開始冒險";
      }

      startButton.style.display = "block";

      localStorage.setItem(
        "bibleKidsLanguage",
        language
      );
    }

    function startAdventure() {
      if (!selectedLanguage) {
        return;
      }

      document.body.classList.add("leaving");

      setTimeout(function () {
        window.location.href = "character.html";
      }, 1200);
    }

    window.addEventListener(
      "load",
      function () {
        const savedLanguage =
          localStorage.getItem("bibleKidsLanguage");

        if (
          savedLanguage === "en" ||
          savedLanguage === "zh-HK"
        ) {
          chooseLanguage(savedLanguage);
        }
      }
    );
  </script>

</body>

</html>
