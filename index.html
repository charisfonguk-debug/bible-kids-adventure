<!DOCTYPE html>
<html lang="zh-HK">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Bible Kids Adventure</title>

  <style>
    /* 令所有元素尺寸計算更容易 */
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;

      display: grid;
      place-items: center;

      overflow: hidden;

      background-color: #17281c;

      font-family:
        Arial,
        "Noto Sans TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    /*
      首頁畫面比例是 1536 × 1024，即 3:2。
      這個設定會保留完整圖片，不會切走兩邊。
    */
    .game-screen {
      position: relative;

      width: min(100vw, 150vh);
      aspect-ratio: 3 / 2;

      overflow: hidden;

      background-image:
        url("images/home-background.png");

      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;

      transition:
        transform 1s ease,
        filter 1s ease,
        opacity 1s ease;
    }

    /*
      圖片本身已有按鈕，
      所以這些按鈕是透明的，
      但仍然可以真正點擊。
    */
    .image-button {
      position: absolute;
      z-index: 10;

      display: block;

      margin: 0;
      padding: 0;

      border: 0;
      border-radius: 18px;

      background-color: transparent;

      color: transparent;
      font-size: 0;

      cursor: pointer;

      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        outline 0.18s ease;
    }

    .image-button:hover {
      transform: translateY(-2px) scale(1.025);

      box-shadow:
        inset 0 0 0 5px rgba(255, 255, 255, 0.3),
        0 0 22px rgba(255, 235, 155, 0.65);
    }

    .image-button:focus-visible {
      outline: 5px solid white;
      outline-offset: 3px;
    }

    .image-button.selected {
      outline: 5px solid rgba(255, 255, 255, 0.92);
      outline-offset: 3px;

      box-shadow:
        0 0 25px rgba(255, 240, 170, 0.9);
    }

    /*
      English 按鈕位置
    */
    #englishButton {
      left: 32.7%;
      top: 51.5%;

      width: 17%;
      height: 9.5%;
    }

    /*
      廣東話按鈕位置
    */
    #cantoneseButton {
      left: 50.5%;
      top: 51.5%;

      width: 17%;
      height: 9.5%;
    }

    /*
      開始冒險按鈕位置
    */
    #startButton {
      left: 38.2%;
      top: 64.1%;

      width: 23.7%;
      height: 10.7%;

      border-radius: 24px;
    }

    #startButton:hover {
      transform: translateY(-3px) scale(1.035);

      box-shadow:
        inset 0 0 0 6px rgba(255, 255, 255, 0.28),
        0 0 30px rgba(219, 255, 127, 0.65);
    }

    /*
      按開始冒險後的白色轉場
    */
    body::after {
      content: "";

      position: fixed;
      inset: 0;
      z-index: 999;

      pointer-events: none;

      background-color: #fff6d8;

      opacity: 0;

      transition: opacity 1s ease;
    }

    body.leaving::after {
      opacity: 1;
    }

    body.leaving .game-screen {
      transform: scale(1.08);

      filter:
        brightness(1.25)
        blur(2px);
    }

    /*
      未選語言時，兩個語言按鈕會搖動
    */
    .shake {
      animation: shakeButtons 0.45s ease;
    }

    @keyframes shakeButtons {
      0% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-8px);
      }

      50% {
        transform: translateX(8px);
      }

      75% {
        transform: translateX(-5px);
      }

      100% {
        transform: translateX(0);
      }
    }

    /*
      給讀屏軟件使用，畫面上不會看見
    */
    .screen-reader-only {
      position: absolute;

      width: 1px;
      height: 1px;

      padding: 0;
      margin: -1px;

      overflow: hidden;

      clip: rect(0, 0, 0, 0);

      white-space: nowrap;

      border: 0;
    }

    /*
      手機直向時提醒用戶轉橫向
    */
    .rotate-message {
      display: none;

      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 50;

      width: max-content;
      max-width: 90%;

      padding: 10px 16px;

      border-radius: 10px;

      background-color: rgba(24, 37, 25, 0.82);

      color: white;
      font-size: 14px;

      transform: translateX(-50%);
    }

    @media (orientation: portrait) and (max-width: 700px) {
      .rotate-message {
        display: block;
      }
    }

    /*
      尊重不喜歡動畫的用戶設定
    */
    @media (prefers-reduced-motion: reduce) {
      .game-screen,
      body::after,
      .image-button {
        transition: none;
      }

      .shake {
        animation: none;
      }
    }
  </style>
</head>

<body>

  <main
    class="game-screen"
    aria-label="Bible Kids Adventure home page"
  >

    <!--
      圖片本身已有 English 圖案，
      這個透明按鈕放在圖片按鈕上面。
    -->
    <button
      type="button"
      class="image-button"
      id="englishButton"
      aria-label="Choose English"
      onclick="chooseLanguage('en')"
    >
      English
    </button>

    <!-- 廣東話透明按鈕 -->
    <button
      type="button"
      class="image-button"
      id="cantoneseButton"
      aria-label="選擇廣東話"
      onclick="chooseLanguage('zh-HK')"
    >
      廣東話
    </button>

    <!-- 開始冒險透明按鈕 -->
    <button
      type="button"
      class="image-button"
      id="startButton"
      aria-label="開始冒險"
      onclick="startAdventure()"
    >
      開始冒險
    </button>

    <p
      class="screen-reader-only"
      id="statusMessage"
      aria-live="polite"
    ></p>

  </main>

  <div class="rotate-message">
    將手機打橫，畫面會更加完整
  </div>

  <script>
    /*
      selectedLanguage 用來記錄玩家選擇的語言。
      一開始暫時沒有選擇。
    */
    let selectedLanguage = "";

    /*
      選擇語言
    */
    function chooseLanguage(language) {
      selectedLanguage = language;

      const englishButton =
        document.getElementById("englishButton");

      const cantoneseButton =
        document.getElementById("cantoneseButton");

      const startButton =
        document.getElementById("startButton");

      const statusMessage =
        document.getElementById("statusMessage");

      /*
        先清除兩個按鈕的選擇效果
      */
      englishButton.classList.remove("selected");
      cantoneseButton.classList.remove("selected");

      /*
        按照玩家選擇加入效果
      */
      if (language === "en") {
        document.documentElement.lang = "en";

        englishButton.classList.add("selected");

        startButton.setAttribute(
          "aria-label",
          "Start Adventure"
        );

        statusMessage.textContent =
          "English selected. Press Start Adventure.";
      } else {
        document.documentElement.lang = "zh-HK";

        cantoneseButton.classList.add("selected");

        startButton.setAttribute(
          "aria-label",
          "開始冒險"
        );

        statusMessage.textContent =
          "已選擇廣東話，請按開始冒險。";
      }

      /*
        記住玩家語言。
        即使重新開啟網站，也會保留選擇。
      */
      localStorage.setItem(
        "bibleKidsLanguage",
        language
      );
    }

    /*
      按開始冒險
    */
    function startAdventure() {
      const englishButton =
        document.getElementById("englishButton");

      const cantoneseButton =
        document.getElementById("cantoneseButton");

      /*
        如果玩家未選擇語言，
        兩個語言按鈕會搖動。
      */
      if (!selectedLanguage) {
        englishButton.classList.add("shake");
        cantoneseButton.classList.add("shake");

        setTimeout(function () {
          englishButton.classList.remove("shake");
          cantoneseButton.classList.remove("shake");
        }, 500);

        return;
      }

      /*
        防止玩家重複按開始按鈕
      */
      if (document.body.classList.contains("leaving")) {
        return;
      }

      /*
        開始畫面放大和變光動畫
      */
      document.body.classList.add("leaving");

      /*
        1 秒後進入角色選擇頁面
      */
      setTimeout(function () {
        window.location.href = "character.html";
      }, 1000);
    }

    /*
      網頁載入時，檢查之前保存的語言。
    */
    window.addEventListener(
      "load",
      function () {
        const savedLanguage =
          localStorage.getItem("bibleKidsLanguage");

        if (
          savedLanguage === "en" ||
          savedLanguage === "zh-HK"
        ) {
          chooseLanguage(savedLanguage);
        }
      }
    );
  </script>

</body>

</html>
