<!DOCTYPE html>
<html lang="zh-HK">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Bible Kids Adventure</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family:
        Arial,
        "Microsoft JhengHei",
        sans-serif;
    }

    .game-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;

      transition:
        transform 1s ease,
        filter 1s ease;
    }

    /*
      真正的背景圖片。
      object-fit: fill 會將圖片拉到整個畫面。
    */
    .background-picture {
      position: absolute;
      top: 0;
      left: 0;

      width: 100%;
      height: 100%;

      object-fit: fill;

      user-select: none;
      pointer-events: none;
    }

    /*
      背景圖片上的透明按鈕
    */
    .image-button {
      position: absolute;
      z-index: 10;

      padding: 0;
      margin: 0;

      border: 0;
      border-radius: 18px;

      background: transparent;
      color: transparent;

      cursor: pointer;

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        outline 0.2s ease;
    }

    .image-button:hover {
      transform: scale(1.03);

      box-shadow:
        inset 0 0 0 5px rgba(255, 255, 255, 0.35),
        0 0 24px rgba(255, 240, 170, 0.8);
    }

    .image-button.selected {
      outline: 5px solid white;
      outline-offset: 2px;

      box-shadow:
        0 0 25px rgba(255, 240, 170, 0.95);
    }

    /*
      English 按鈕
    */
    #englishButton {
      left: 32.7%;
      top: 51.5%;

      width: 17%;
      height: 9.5%;
    }

    /*
      廣東話按鈕
    */
    #cantoneseButton {
      left: 50.5%;
      top: 51.5%;

      width: 17%;
      height: 9.5%;
    }

    /*
      開始冒險按鈕
    */
    #startButton {
      left: 38.2%;
      top: 64.1%;

      width: 23.7%;
      height: 10.7%;

      border-radius: 25px;
    }

    /*
      轉場白色畫面
    */
    body::after {
      content: "";

      position: fixed;
      inset: 0;
      z-index: 999;

      background: #fff5d6;

      opacity: 0;
      pointer-events: none;

      transition: opacity 1s ease;
    }

    body.leaving::after {
      opacity: 1;
    }

    body.leaving .game-screen {
      transform: scale(1.08);

      filter:
        brightness(1.25)
        blur(2px);
    }

    /*
      未選語言時搖動
    */
    .shake {
      animation: shake 0.45s ease;
    }

    @keyframes shake {
      0% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-8px);
      }

      50% {
        transform: translateX(8px);
      }

      75% {
        transform: translateX(-5px);
      }

      100% {
        transform: translateX(0);
      }
    }
  </style>
</head>

<body>

  <main class="game-screen">

    <!-- 背景圖片 -->
    <img
      class="background-picture"
      src="images/home-background.png"
      alt=""
    >

    <!-- English -->
    <button
      type="button"
      class="image-button"
      id="englishButton"
      aria-label="Choose English"
      onclick="chooseLanguage('en')"
    >
      English
    </button>

    <!-- 廣東話 -->
    <button
      type="button"
      class="image-button"
      id="cantoneseButton"
      aria-label="選擇廣東話"
      onclick="chooseLanguage('zh-HK')"
    >
      廣東話
    </button>

    <!-- 開始冒險 -->
    <button
      type="button"
      class="image-button"
      id="startButton"
      aria-label="開始冒險"
      onclick="startAdventure()"
    >
      開始冒險
    </button>

  </main>

  <script>
    let selectedLanguage = "";

    function chooseLanguage(language) {
      selectedLanguage = language;

      const englishButton =
        document.getElementById("englishButton");

      const cantoneseButton =
        document.getElementById("cantoneseButton");

      englishButton.classList.remove("selected");
      cantoneseButton.classList.remove("selected");

      if (language === "en") {
        englishButton.classList.add("selected");
      } else {
        cantoneseButton.classList.add("selected");
      }

      localStorage.setItem(
        "bibleKidsLanguage",
        language
      );
    }

    function startAdventure() {
      const englishButton =
        document.getElementById("englishButton");

      const cantoneseButton =
        document.getElementById("cantoneseButton");

      if (!selectedLanguage) {
        englishButton.classList.add("shake");
        cantoneseButton.classList.add("shake");

        setTimeout(function () {
          englishButton.classList.remove("shake");
          cantoneseButton.classList.remove("shake");
        }, 500);

        return;
      }

      document.body.classList.add("leaving");

      setTimeout(function () {
        window.location.href = "character.html";
      }, 1000);
    }

    window.addEventListener("load", function () {
      const savedLanguage =
        localStorage.getItem("bibleKidsLanguage");

      if (
        savedLanguage === "en" ||
        savedLanguage === "zh-HK"
      ) {
        chooseLanguage(savedLanguage);
      }
    });
  </script>

</body>

</html>
