<!DOCTYPE html>
<html lang="zh-HK">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <title>Bible Kids Adventure</title>

  <style>
    /* =========================
       基本設定
    ========================== */

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;

      overflow-x: hidden;

      font-family:
        Arial,
        "Noto Sans TC",
        "Microsoft JhengHei",
        sans-serif;

      background-color: #9fc47f;
    }

    button {
      font: inherit;
    }

    /* =========================
       首頁背景
    ========================== */

    .page {
      position: relative;

      width: 100%;
      min-height: 100vh;
      min-height: 100svh;

      display: flex;
      align-items: center;
      justify-content: center;

      padding:
        max(30px, env(safe-area-inset-top))
        max(24px, env(safe-area-inset-right))
        max(30px, env(safe-area-inset-bottom))
        max(24px, env(safe-area-inset-left));

      overflow: hidden;

      background-image:
        linear-gradient(
          rgba(25, 45, 27, 0.03),
          rgba(25, 45, 27, 0.11)
        ),
        url("images/home-background.png");

      /*
        cover 會填滿畫面，
        但唔會拉長或者壓扁圖片。
      */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      transition:
        transform 1.1s ease,
        filter 1.1s ease;
    }

    /* =========================
       木牌 Logo
    ========================== */

    .brand {
      position: absolute;
      top: 46px;
      right: 34px;
      z-index: 10;

      min-width: 270px;

      padding: 15px 26px 17px;

      border: 4px solid #4b2a13;
      border-radius:
        18px 13px 20px 14px;

      /*
        多層漸變製造木紋。
      */
      background:
        repeating-linear-gradient(
          4deg,
          rgba(255, 224, 161, 0.08) 0,
          rgba(255, 224, 161, 0.08) 3px,
          rgba(70, 34, 13, 0.08) 4px,
          rgba(70, 34, 13, 0.08) 7px
        ),

        repeating-linear-gradient(
          96deg,
          transparent 0,
          transparent 18px,
          rgba(73, 34, 13, 0.09) 20px,
          transparent 24px
        ),

        linear-gradient(
          180deg,
          #ae7541 0%,
          #93592d 35%,
          #78431f 70%,
          #603316 100%
        );

      box-shadow:
        0 7px 0 #3b2110,
        0 15px 28px rgba(43, 25, 12, 0.36),
        inset 0 3px 0 rgba(255, 231, 178, 0.25),
        inset 0 -4px 0 rgba(67, 31, 13, 0.22);

      text-align: center;

      transform: rotate(-1deg);
    }

    /*
      木牌內框，
      令木牌更似真正雕刻招牌。
    */
    .brand::before {
      content: "";

      position: absolute;
      inset: 7px;

      border:
        1px solid rgba(255, 218, 147, 0.25);

      border-radius:
        11px 8px 13px 9px;

      pointer-events: none;
    }

    /*
      木牌底部淡淡木紋。
    */
    .brand::after {
      content: "";

      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 10px;

      height: 2px;

      border-radius: 50%;

      background:
        rgba(61, 28, 11, 0.28);

      box-shadow:
        0 -14px 0 rgba(255, 217, 144, 0.07),
        0 -28px 0 rgba(61, 28, 11, 0.08);

      pointer-events: none;
    }

    /* =========================
       吊木牌嘅兩條繩
    ========================== */

    .brand-rope {
      position: absolute;
      top: -48px;

      width: 5px;
      height: 50px;

      border-radius: 5px;

      background:
        repeating-linear-gradient(
          0deg,
          #5b4026 0,
          #5b4026 4px,
          #826142 5px,
          #826142 8px
        );

      box-shadow:
        1px 0 0 rgba(255, 255, 255, 0.18),
        -1px 0 0 rgba(48, 29, 16, 0.35);

      transform-origin: bottom;
    }

    .rope-left {
      left: 49px;

      transform: rotate(-6deg);
    }

    .rope-right {
      right: 49px;

      transform: rotate(6deg);
    }

    /*
      繩同木牌連接位置嘅釘。
    */
    .rope-nail {
      position: absolute;
      top: 10px;

      width: 10px;
      height: 10px;

      border: 2px solid #38200f;
      border-radius: 50%;

      background:
        radial-gradient(
          circle at 35% 30%,
          #d7bb8c,
          #765333 55%,
          #3d2918 100%
        );

      box-shadow:
        0 2px 2px rgba(32, 18, 8, 0.45);
    }

    .nail-left {
      left: 44px;
    }

    .nail-right {
      right: 44px;
    }

    /* =========================
       木結紋理
    ========================== */

    .wood-knot {
      position: absolute;

      width: 24px;
      height: 13px;

      border:
        2px solid rgba(68, 30, 11, 0.42);

      border-radius: 50%;

      background:
        radial-gradient(
          ellipse at center,
          rgba(82, 37, 14, 0.5) 0%,
          rgba(132, 76, 36, 0.42) 36%,
          rgba(66, 29, 10, 0.3) 40%,
          transparent 70%
        );

      opacity: 0.7;

      pointer-events: none;
    }

    .knot-left {
      left: 18px;
      bottom: 19px;

      transform: rotate(-13deg);
    }

    .knot-right {
      right: 17px;
      top: 20px;

      transform: rotate(11deg) scale(0.8);
    }

    /* =========================
       Logo 文字
    ========================== */

    .brand-small {
      position: relative;
      z-index: 2;

      display: block;

      font-size: 13px;
      font-weight: 900;
      letter-spacing: 3px;
      line-height: 1;

      color: #fff0c7;

      text-shadow:
        1px 2px 0 #4c2811;
    }

    .brand-large {
      position: relative;
      z-index: 2;

      display: block;

      margin-top: 7px;

      font-family:
        Georgia,
        "Times New Roman",
        serif;

      font-size: 31px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 0.95;

      color: #ffd66b;

      text-shadow:
        2px 3px 0 #4d2811,
        0 0 2px rgba(255, 235, 166, 0.35);
    }

    .brand-meaning {
      position: relative;
      z-index: 2;

      display: block;

      margin-top: 8px;

      font-family:
        Georgia,
        "Times New Roman",
        serif;

      font-size: 12px;
      font-style: italic;
      font-weight: 700;
      letter-spacing: 0.6px;

      color: #fff0c9;

      text-shadow:
        1px 1px 0 rgba(68, 35, 14, 0.7);
    }

    /* =========================
       中央內容卡
    ========================== */

    .welcome-panel {
      position: relative;
      z-index: 5;

      width: min(92vw, 620px);

      padding:
        clamp(27px, 5vw, 46px);

      border:
        3px solid rgba(91, 59, 29, 0.68);

      border-radius: 25px;

      background:
        linear-gradient(
          145deg,
          rgba(255, 251, 226, 0.94),
          rgba(244, 224, 170, 0.91)
        );

      box-shadow:
        0 15px 0 rgba(92, 57, 26, 0.18),
        0 24px 45px rgba(47, 35, 19, 0.3),
        inset 0 2px 0 rgba(255, 255, 255, 0.9);

      text-align: center;

      backdrop-filter: blur(4px);
    }

    .eyebrow {
      margin: 0 0 12px;

      font-size:
        clamp(13px, 2vw, 16px);

      font-weight: 900;
      letter-spacing: 2.5px;
      text-transform: uppercase;

      color: #6c4b29;
    }

    .main-title {
      margin: 0;

      font-family:
        Georgia,
        "Times New Roman",
        serif;

      font-size:
        clamp(44px, 7vw, 72px);

      font-weight: 900;
      line-height: 0.96;

      color: #59371e;

      text-shadow:
        2px 3px 0 #efc66b;
    }

    .description {
      max-width: 490px;

      margin: 20px auto 25px;

      font-size:
        clamp(16px, 2.4vw, 20px);

      font-weight: 650;
      line-height: 1.55;

      color: #354a35;
    }

    .language-label {
      margin: 0 0 14px;

      font-size: 16px;
      font-weight: 850;

      color: #4d3a25;
    }

    /* =========================
       語言按鈕
    ========================== */

    .language-options {
      display: grid;

      grid-template-columns:
        repeat(2, minmax(0, 1fr));

      gap: 15px;

      width: 100%;
      max-width: 440px;

      margin: 0 auto;
    }

    .language-button {
      min-height: 58px;

      padding: 12px 18px;

      border: 3px solid #60401f;

      border-radius:
        14px 10px 15px 11px;

      background:
        linear-gradient(
          to bottom,
          #fff4c9,
          #dfb760
        );

      box-shadow:
        0 6px 0 #55371b;

      color: #382919;

      font-size: 18px;
      font-weight: 900;

      cursor: pointer;

      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        filter 0.18s ease;
    }

    .language-button:hover {
      transform:
        translateY(-4px);

      box-shadow:
        0 10px 0 #55371b;

      filter:
        brightness(1.04);
    }

    .language-button:active {
      transform:
        translateY(3px);

      box-shadow:
        0 2px 0 #55371b;
    }

    .language-button.selected {
      background:
        linear-gradient(
          to bottom,
          #fffef0,
          #ffe393
        );

      outline:
        4px solid rgba(255, 255, 255, 0.95);

      outline-offset: 3px;

      box-shadow:
        0 6px 0 #55371b,
        0 0 22px rgba(255, 224, 107, 0.95);
    }

    /* =========================
       歡迎訊息
    ========================== */

    .welcome-message {
      min-height: 28px;

      margin: 24px 0 12px;

      font-size: 17px;
      font-weight: 800;

      color: #405236;
    }

    /* =========================
       Start 按鈕
    ========================== */

    .start-button {
      width: min(100%, 330px);
      min-height: 67px;

      padding: 15px 25px;

      border: 4px solid #493318;

      border-radius:
        17px 12px 18px 13px;

      background:
        linear-gradient(
          to bottom,
          #9ac547,
          #507b27
        );

      box-shadow:
        0 8px 0 #3e2b17,
        0 14px 26px rgba(43, 54, 24, 0.3);

      color: white;

      font-size:
        clamp(20px, 3vw, 25px);

      font-weight: 900;

      text-shadow:
        1px 2px 0 rgba(44, 57, 20, 0.75);

      cursor: pointer;

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        filter 0.2s ease;
    }

    .start-button:hover:not(:disabled) {
      transform:
        translateY(-5px)
        scale(1.02);

      box-shadow:
        0 13px 0 #3e2b17,
        0 18px 30px rgba(43, 54, 24, 0.35);

      filter:
        brightness(1.08);
    }

    .start-button:active:not(:disabled) {
      transform:
        translateY(3px);

      box-shadow:
        0 3px 0 #3e2b17;
    }

    .start-button:disabled {
      opacity: 0.54;

      cursor: not-allowed;

      filter:
        grayscale(0.3)
        brightness(0.92);
    }

    .small-note {
      margin: 17px 0 0;

      font-size: 13px;
      line-height: 1.45;

      color: #675942;
    }

    /* =========================
       Start 轉場動畫
    ========================== */

    body::after {
      content: "";

      position: fixed;
      inset: 0;
      z-index: 100;

      pointer-events: none;

      background:
        radial-gradient(
          circle at center,
          rgba(255, 255, 232, 0.98),
          rgba(255, 242, 190, 1)
        );

      opacity: 0;

      transition:
        opacity 1.1s ease;
    }

    body.leaving::after {
      opacity: 1;
    }

    body.leaving .page {
      transform:
        scale(1.1);

      filter:
        brightness(1.25)
        blur(2px);
    }

    body.leaving .welcome-panel {
      animation:
        panelLeave
        1.1s ease
        forwards;
    }

    @keyframes panelLeave {
      from {
        opacity: 1;

        transform:
          translateY(0)
          scale(1);
      }

      to {
        opacity: 0;

        transform:
          translateY(-18px)
          scale(0.96);
      }
    }

    /* =========================
       手機版
    ========================== */

    @media (max-width: 700px) {
      .page {
        align-items: flex-start;

        padding-top:
          max(165px, env(safe-area-inset-top));

        background-position:
          52% center;
      }

      .brand {
        top: 51px;
        right: 50%;

        min-width: 245px;

        padding:
          13px 20px 15px;

        transform:
          translateX(50%)
          rotate(0deg);
      }

      .brand-rope {
        top: -40px;

        height: 42px;
      }

      .rope-left {
        left: 44px;
      }

      .rope-right {
        right: 44px;
      }

      .nail-left {
        left: 39px;
      }

      .nail-right {
        right: 39px;
      }

      .brand-small {
        font-size: 11px;

        letter-spacing: 2.4px;
      }

      .brand-large {
        font-size: 25px;
      }

      .brand-meaning {
        font-size: 10px;
      }

      .welcome-panel {
        width:
          min(94vw, 520px);

        padding:
          25px 19px 29px;

        border-radius: 20px;
      }

      .main-title {
        font-size:
          clamp(40px, 12vw, 58px);
      }

      .description {
        margin-top: 17px;
        margin-bottom: 22px;

        font-size: 16px;
      }

      .language-options {
        grid-template-columns: 1fr;

        gap: 12px;
      }

      .language-button {
        min-height: 54px;
      }

      .start-button {
        min-height: 61px;
      }
    }

    /* =========================
       矮螢幕電腦
    ========================== */

    @media
    (max-height: 680px)
    and
    (min-width: 701px) {

      .page {
        align-items: flex-start;

        overflow-y: auto;
      }

      .brand {
        top: 44px;
      }

      .welcome-panel {
        margin-top: 90px;
        margin-bottom: 35px;

        padding:
          25px 34px;
      }

      .main-title {
        font-size: 50px;
      }

      .description {
        margin-top: 14px;
        margin-bottom: 18px;
      }

      .welcome-message {
        margin-top: 17px;
      }

      .start-button {
        min-height: 58px;
      }
    }

    /* =========================
       減少動畫設定
    ========================== */

    @media (prefers-reduced-motion: reduce) {
      .page,
      body::after,
      .welcome-panel,
      .language-button,
      .start-button {
        transition: none;
        animation: none;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <!-- 木牌 Logo -->
      <div
      class="brand"
      aria-label="Bible Kids Adventure"
    >
      <span class="brand-small">
        BIBLE KIDS
      </span>
    
      <span class="brand-large">
        ADVENTURE
      </span>
    
      <span
        class="brand-meaning"
        id="brandMeaning"
      >
        Faith · Promise · Journey
      </span>
    </div>
    <!-- 中央內容 -->
    <section class="welcome-panel">

      <p
        class="eyebrow"
        id="eyebrow"
      >
        A journey of faith
      </p>

      <h1
        class="main-title"
        id="mainTitle"
      >
        Begin Your Journey
      </h1>

      <p
        class="description"
        id="description"
      >
        Explore the Bible and discover a world
        of faith, courage and adventure.
      </p>

      <p
        class="language-label"
        id="languageLabel"
      >
        Choose your language · 請選擇語言
      </p>

      <div class="language-options">

        <button
          type="button"
          class="language-button"
          id="englishButton"
          onclick="chooseLanguage('en')"
        >
          English
        </button>

        <button
          type="button"
          class="language-button"
          id="cantoneseButton"
          onclick="chooseLanguage('zh-HK')"
        >
          廣東話
        </button>

      </div>

      <p
        class="welcome-message"
        id="welcomeMessage"
        aria-live="polite"
      >
        Please choose a language to continue.
      </p>

      <button
        type="button"
        class="start-button"
        id="startButton"
        onclick="startAdventure()"
        disabled
      >
        Start Adventure
      </button>

      <p
        class="small-note"
        id="smallNote"
      >
        Follow the path and begin your Bible adventure.
      </p>

    </section>

  </main>

  <script>
    /*
      記錄玩家選擇嘅語言
    */
    let selectedLanguage = "";

    /*
      取得網頁元素
    */
    const englishButton =
      document.getElementById(
        "englishButton"
      );

    const cantoneseButton =
      document.getElementById(
        "cantoneseButton"
      );

    const startButton =
      document.getElementById(
        "startButton"
      );

    const eyebrow =
      document.getElementById(
        "eyebrow"
      );

    const mainTitle =
      document.getElementById(
        "mainTitle"
      );

    const description =
      document.getElementById(
        "description"
      );

    const languageLabel =
      document.getElementById(
        "languageLabel"
      );

    const welcomeMessage =
      document.getElementById(
        "welcomeMessage"
      );

    const smallNote =
      document.getElementById(
        "smallNote"
      );

    const brandMeaning =
      document.getElementById(
        "brandMeaning"
      );

    /*
      玩家選擇語言
    */
    function chooseLanguage(language) {
      selectedLanguage = language;

      englishButton.classList.remove(
        "selected"
      );

      cantoneseButton.classList.remove(
        "selected"
      );

      startButton.disabled = false;

      /*
        English
      */
      if (language === "en") {
        document.documentElement.lang =
          "en";

        englishButton.classList.add(
          "selected"
        );

        eyebrow.textContent =
          "A journey of faith";

        mainTitle.textContent =
          "Begin Your Journey";

        description.textContent =
          "Explore the Bible and discover a world of faith, courage and adventure.";

        languageLabel.textContent =
          "Choose your language";

        welcomeMessage.textContent =
          "Welcome, young explorer.";

        startButton.textContent =
          "Start Adventure";

        smallNote.textContent =
          "Follow the path and begin your Bible adventure.";

        brandMeaning.textContent =
          "Faith · Promise · Journey";
      }

      /*
        廣東話
      */
      else {
        document.documentElement.lang =
          "zh-HK";

        cantoneseButton.classList.add(
          "selected"
        );

        eyebrow.textContent =
          "信心嘅旅程";

        mainTitle.textContent =
          "展開你嘅旅程";

        description.textContent =
          "探索聖經，發現一個充滿信心、勇氣同冒險嘅世界。";

        languageLabel.textContent =
          "請選擇語言";

        welcomeMessage.textContent =
          "歡迎你，小小探險家。";

        startButton.textContent =
          "開始冒險";

        smallNote.textContent =
          "沿住小路，展開你嘅聖經冒險。";

        brandMeaning.textContent =
          "信心 · 應許 · 旅程";
      }

      /*
        保存語言選擇
      */
      localStorage.setItem(
        "bibleKidsLanguage",
        language
      );
    }

    /*
      開始冒險
    */
    function startAdventure() {
      if (!selectedLanguage) {
        return;
      }

      /*
        防止重複按掣
      */
      if (
        document.body.classList.contains(
          "leaving"
        )
      ) {
        return;
      }

      startButton.disabled = true;

      /*
        開始轉場動畫
      */
      document.body.classList.add(
        "leaving"
      );

      /*
        1.1 秒後進入角色選擇頁
      */
      setTimeout(
        function () {
          window.location.href =
            "character.html";
        },
        1100
      );
    }

    /*
      載入之前保存嘅語言
    */
    window.addEventListener(
      "load",
      function () {
        const savedLanguage =
          localStorage.getItem(
            "bibleKidsLanguage"
          );

        if (
          savedLanguage === "en" ||
          savedLanguage === "zh-HK"
        ) {
          chooseLanguage(
            savedLanguage
          );
        }
      }
    );
  </script>

</body>

</html>
