<!DOCTYPE html>
<html lang="zh-HK">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <title>Bible Kids Adventure</title>

  <style>
    /* =========================
       基本設定
    ========================== */

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;

      overflow-x: hidden;

      font-family:
        Arial,
        "Noto Sans TC",
        "Microsoft JhengHei",
        sans-serif;

      background-color: #9dc47d;
    }

    button {
      font: inherit;
    }

    /* =========================
       首頁背景
    ========================== */

    .page {
      position: relative;

      width: 100%;
      min-height: 100vh;
      min-height: 100svh;

      display: flex;
      align-items: center;
      justify-content: center;

      padding:
        max(30px, env(safe-area-inset-top))
        max(24px, env(safe-area-inset-right))
        max(30px, env(safe-area-inset-bottom))
        max(24px, env(safe-area-inset-left));

      overflow: hidden;

      background-image:
        linear-gradient(
          rgba(24, 48, 28, 0.04),
          rgba(24, 48, 28, 0.12)
        ),
        url("images/home-background.png");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      transition:
        transform 1.1s ease,
        filter 1.1s ease;
    }

    /* =========================
       Logo 吊架
    ========================== */

    .logo-hanger {
      position: absolute;
      top: 0;
      right: 65px;
      z-index: 10;

      width: 310px;
      height: 195px;
    }

    /* =========================
       兩條吊繩
    ========================== */

    .logo-rope {
      position: absolute;
      top: 0;
      z-index: 1;

      width: 7px;
      height: 84px;

      border-radius: 0 0 6px 6px;

      background:
        repeating-linear-gradient(
          135deg,
          #3d2818 0,
          #3d2818 3px,
          #8a6745 3px,
          #8a6745 6px,
          #594029 6px,
          #594029 9px
        );

      box-shadow:
        1px 0 0 rgba(255, 255, 255, 0.18),
        -1px 0 0 rgba(42, 25, 13, 0.35);
    }

    .logo-rope-left {
      left: 57px;
    }

    .logo-rope-right {
      right: 57px;
    }

    /* =========================
       木牌 Logo
    ========================== */

    .brand {
      position: absolute;
      top: 78px;
      left: 0;
      z-index: 2;

      width: 100%;

      padding:
        18px 28px 20px;

      border: 4px solid #4c2d16;

      border-radius:
        21px 14px 24px 16px;

      /*
        第一層係非常淡嘅木紋。
        第二層係原本簡單木色。
      */
      background:
        repeating-linear-gradient(
          3deg,
          rgba(255, 235, 190, 0.055) 0,
          rgba(255, 235, 190, 0.055) 2px,
          rgba(79, 38, 15, 0.045) 3px,
          rgba(79, 38, 15, 0.045) 5px,
          transparent 6px,
          transparent 14px
        ),
        linear-gradient(
          180deg,
          #ae7440 0%,
          #89542a 55%,
          #683719 100%
        );

      box-shadow:
        0 8px 0 #3b2413,
        0 15px 27px rgba(42, 25, 13, 0.34),
        inset 0 3px 0 rgba(255, 231, 176, 0.28);

      text-align: center;

      transform: rotate(-1.5deg);
    }

    /* =========================
       Logo 文字
    ========================== */

    .brand-small {
      display: block;

      font-family:
        "Trebuchet MS",
        "Arial Rounded MT Bold",
        Arial,
        sans-serif;

      font-size: 15px;
      font-weight: 900;
      letter-spacing: 2.2px;
      line-height: 1;

      color: #fff1c9;

      text-shadow:
        1px 2px 0 #4b2812;
    }

    .brand-large {
      display: block;

      margin-top: 7px;

      font-family:
        "Trebuchet MS",
        "Arial Rounded MT Bold",
        Arial,
        sans-serif;

      font-size: 38px;
      font-weight: 900;
      letter-spacing: 0.5px;
      line-height: 0.95;

      color: #ffd96c;

      text-shadow:
        2px 3px 0 #4d2913;

      transform: rotate(0.5deg);
    }

    /* =========================
       中央內容卡
    ========================== */

    .welcome-panel {
      position: relative;
      z-index: 5;

      width: min(92vw, 620px);

      padding:
        clamp(27px, 5vw, 46px);

      border:
        3px solid rgba(91, 59, 29, 0.68);

      border-radius: 25px;

      background:
        linear-gradient(
          145deg,
          rgba(255, 251, 226, 0.94),
          rgba(244, 224, 170, 0.91)
        );

      box-shadow:
        0 15px 0 rgba(92, 57, 26, 0.18),
        0 24px 45px rgba(47, 35, 19, 0.3),
        inset 0 2px 0 rgba(255, 255, 255, 0.9);

      text-align: center;

      backdrop-filter: blur(4px);
    }

    .eyebrow {
      margin: 0 0 12px;

      font-size:
        clamp(13px, 2vw, 16px);

      font-weight: 900;
      letter-spacing: 2.5px;
      text-transform: uppercase;

      color: #6c4b29;
    }

    .main-title {
      margin: 0;

      font-family:
        Georgia,
        "Times New Roman",
        serif;

      font-size:
        clamp(44px, 7vw, 72px);

      font-weight: 900;
      line-height: 0.96;

      color: #59371e;

      text-shadow:
        2px 3px 0 #efc66b;
    }

    .description {
      max-width: 490px;

      margin: 20px auto 25px;

      font-size:
        clamp(16px, 2.4vw, 20px);

      font-weight: 650;
      line-height: 1.55;

      color: #354a35;
    }

    .language-label {
      margin: 0 0 14px;

      font-size: 16px;
      font-weight: 850;

      color: #4d3a25;
    }

    /* =========================
       語言按鈕
    ========================== */

    .language-options {
      display: grid;

      grid-template-columns:
        repeat(2, minmax(0, 1fr));

      gap: 15px;

      width: 100%;
      max-width: 440px;

      margin: 0 auto;
    }

    .language-button {
      min-height: 58px;

      padding: 12px 18px;

      border: 3px solid #60401f;

      border-radius:
        14px 10px 15px 11px;

      background:
        linear-gradient(
          to bottom,
          #fff4c9,
          #dfb760
        );

      box-shadow:
        0 6px 0 #55371b;

      color: #382919;

      font-size: 18px;
      font-weight: 900;

      cursor: pointer;

      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        filter 0.18s ease;
    }

    .language-button:hover {
      transform:
        translateY(-4px);

      box-shadow:
        0 10px 0 #55371b;

      filter: brightness(1.04);
    }

    .language-button:active {
      transform:
        translateY(3px);

      box-shadow:
        0 2px 0 #55371b;
    }

    .language-button.selected {
      background:
        linear-gradient(
          to bottom,
          #fffef0,
          #ffe393
        );

      outline:
        4px solid rgba(255, 255, 255, 0.95);

      outline-offset: 3px;

      box-shadow:
        0 6px 0 #55371b,
        0 0 22px rgba(255, 224, 107, 0.95);
    }

    /* =========================
       歡迎訊息
    ========================== */

    .welcome-message {
      min-height: 28px;

      margin: 24px 0 12px;

      font-size: 17px;
      font-weight: 800;

      color: #405236;
    }

    /* =========================
       Start 按鈕
    ========================== */

    .start-button {
      width: min(100%, 330px);
      min-height: 67px;

      padding: 15px 25px;

      border: 4px solid #493318;

      border-radius:
        17px 12px 18px 13px;

      background:
        linear-gradient(
          to bottom,
          #9ac547,
          #507b27
        );

      box-shadow:
        0 8px 0 #3e2b17,
        0 14px 26px rgba(43, 54, 24, 0.3);

      color: white;

      font-size:
        clamp(20px, 3vw, 25px);

      font-weight: 900;

      text-shadow:
        1px 2px 0 rgba(44, 57, 20, 0.75);

      cursor: pointer;

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        filter 0.2s ease;
    }

    .start-button:hover:not(:disabled) {
      transform:
        translateY(-5px)
        scale(1.02);

      box-shadow:
        0 13px 0 #3e2b17,
        0 18px 30px rgba(43, 54, 24, 0.35);

      filter: brightness(1.08);
    }

    .start-button:active:not(:disabled) {
      transform:
        translateY(3px);

      box-shadow:
        0 3px 0 #3e2b17;
    }

    .start-button:disabled {
      opacity: 0.54;

      cursor: not-allowed;

      filter:
        grayscale(0.3)
        brightness(0.92);
    }

    .small-note {
      margin: 17px 0 0;

      font-size: 13px;
      line-height: 1.45;

      color: #675942;
    }

    /* =========================
       Start 轉場動畫
    ========================== */

    body::after {
      content: "";

      position: fixed;
      inset: 0;
      z-index: 100;

      pointer-events: none;

      background:
        radial-gradient(
          circle at center,
          rgba(255, 255, 232, 0.98),
          rgba(255, 242, 190, 1)
        );

      opacity: 0;

      transition:
        opacity 1.1s ease;
    }

    body.leaving::after {
      opacity: 1;
    }

    body.leaving .page {
      transform:
        scale(1.1);

      filter:
        brightness(1.25)
        blur(2px);
    }

    body.leaving .welcome-panel {
      animation:
        panelLeave
        1.1s ease
        forwards;
    }

    @keyframes panelLeave {
      from {
        opacity: 1;

        transform:
          translateY(0)
          scale(1);
      }

      to {
        opacity: 0;

        transform:
          translateY(-18px)
          scale(0.96);
      }
    }

    /* =========================
       手機版
    ========================== */

    @media (max-width: 700px) {
      .page {
        align-items: flex-start;

        padding-top:
          max(195px, env(safe-area-inset-top));

        background-position:
          52% center;
      }

      .logo-hanger {
        top: 0;
        right: auto;
        left: 50%;

        width: 270px;
        height: 175px;

        transform:
          translateX(-50%);
      }

      .logo-rope {
        width: 6px;
        height: 73px;
      }

      .logo-rope-left {
        left: 49px;
      }

      .logo-rope-right {
        right: 49px;
      }

      .brand {
        top: 68px;

        padding:
          15px 20px 17px;

        transform:
          rotate(-1deg);
      }

      .brand-small {
        font-size: 12px;
        letter-spacing: 1.9px;
      }

      .brand-large {
        font-size: 30px;
      }

      .welcome-panel {
        width:
          min(94vw, 520px);

        padding:
          25px 19px 29px;

        border-radius: 20px;
      }

      .main-title {
        font-size:
          clamp(40px, 12vw, 58px);
      }

      .description {
        margin-top: 17px;
        margin-bottom: 22px;

        font-size: 16px;
      }

      .language-options {
        grid-template-columns: 1fr;

        gap: 12px;
      }

      .language-button {
        min-height: 54px;
      }

      .start-button {
        min-height: 61px;
      }
    }

    /* =========================
       較窄電腦畫面
    ========================== */

    @media
    (min-width: 701px)
    and
    (max-width: 1050px) {

      .logo-hanger {
        right: 28px;

        width: 270px;
      }

      .logo-rope-left {
        left: 49px;
      }

      .logo-rope-right {
        right: 49px;
      }

      .brand {
        padding:
          15px 21px 18px;
      }

      .brand-small {
        font-size: 13px;
      }

      .brand-large {
        font-size: 32px;
      }
    }

    /* =========================
       較矮電腦畫面
    ========================== */

    @media
    (max-height: 680px)
    and
    (min-width: 701px) {

      .page {
        align-items: flex-start;

        overflow-y: auto;
      }

      .welcome-panel {
        margin-top: 110px;
        margin-bottom: 35px;

        padding:
          25px 34px;
      }

      .main-title {
        font-size: 50px;
      }

      .description {
        margin-top: 14px;
        margin-bottom: 18px;
      }

      .welcome-message {
        margin-top: 17px;
      }

      .start-button {
        min-height: 58px;
      }
    }

    /* =========================
       減少動畫
    ========================== */

    @media (prefers-reduced-motion: reduce) {
      .page,
      body::after,
      .welcome-panel,
      .language-button,
      .start-button {
        transition: none;
        animation: none;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <!-- 吊掛木牌 Logo -->
    <div
      class="logo-hanger"
      aria-label="Bible Kids Adventure"
    >

      <span
        class="logo-rope logo-rope-left"
        aria-hidden="true"
      ></span>

      <span
        class="logo-rope logo-rope-right"
        aria-hidden="true"
      ></span>

      <div class="brand">
        <span class="brand-small">
          BIBLE KIDS
        </span>

        <span class="brand-large">
          ADVENTURE
        </span>
      </div>

    </div>

    <!-- 中央內容 -->
    <section class="welcome-panel">

      <p
        class="eyebrow"
        id="eyebrow"
      >
        A journey of faith
      </p>

      <h1
        class="main-title"
        id="mainTitle"
      >
        Begin Your Journey
      </h1>

      <p
        class="description"
        id="description"
      >
        Explore the Bible and discover a world
        of faith, courage and adventure.
      </p>

      <p
        class="language-label"
        id="languageLabel"
      >
        Choose your language · 請選擇語言
      </p>

      <div class="language-options">

        <button
          type="button"
          class="language-button"
          id="englishButton"
          onclick="chooseLanguage('en')"
        >
          English
        </button>

        <button
          type="button"
          class="language-button"
          id="cantoneseButton"
          onclick="chooseLanguage('zh-HK')"
        >
          廣東話
        </button>

      </div>

      <p
        class="welcome-message"
        id="welcomeMessage"
        aria-live="polite"
      >
        Please choose a language to continue.
      </p>

      <button
        type="button"
        class="start-button"
        id="startButton"
        onclick="startAdventure()"
        disabled
      >
        Start Adventure
      </button>

      <p
        class="small-note"
        id="smallNote"
      >
        Follow the path and begin your Bible adventure.
      </p>

    </section>

  </main>

  <script>
    let selectedLanguage = "";

    const englishButton =
      document.getElementById(
        "englishButton"
      );

    const cantoneseButton =
      document.getElementById(
        "cantoneseButton"
      );

    const startButton =
      document.getElementById(
        "startButton"
      );

    const eyebrow =
      document.getElementById(
        "eyebrow"
      );

    const mainTitle =
      document.getElementById(
        "mainTitle"
      );

    const description =
      document.getElementById(
        "description"
      );

    const languageLabel =
      document.getElementById(
        "languageLabel"
      );

    const welcomeMessage =
      document.getElementById(
        "welcomeMessage"
      );

    const smallNote =
      document.getElementById(
        "smallNote"
      );

    function chooseLanguage(language) {
      selectedLanguage = language;

      englishButton.classList.remove(
        "selected"
      );

      cantoneseButton.classList.remove(
        "selected"
      );

      startButton.disabled = false;

      if (language === "en") {
        document.documentElement.lang =
          "en";

        englishButton.classList.add(
          "selected"
        );

        eyebrow.textContent =
          "A journey of faith";

        mainTitle.textContent =
          "Begin Your Journey";

        description.textContent =
          "Explore the Bible and discover a world of faith, courage and adventure.";

        languageLabel.textContent =
          "Choose your language";

        welcomeMessage.textContent =
          "Welcome, young explorer.";

        startButton.textContent =
          "Start Adventure";

        smallNote.textContent =
          "Follow the path and begin your Bible adventure.";
      } else {
        document.documentElement.lang =
          "zh-HK";

        cantoneseButton.classList.add(
          "selected"
        );

        eyebrow.textContent =
          "信心嘅旅程";

        mainTitle.textContent =
          "展開你嘅旅程";

        description.textContent =
          "探索聖經，發現一個充滿信心、勇氣同冒險嘅世界。";

        languageLabel.textContent =
          "請選擇語言";

        welcomeMessage.textContent =
          "歡迎你，小小探險家。";

        startButton.textContent =
          "開始冒險";

        smallNote.textContent =
          "沿住小路，展開你嘅聖經冒險。";
      }

      localStorage.setItem(
        "bibleKidsLanguage",
        language
      );
    }

    function startAdventure() {
      if (!selectedLanguage) {
        return;
      }

      if (
        document.body.classList.contains(
          "leaving"
        )
      ) {
        return;
      }

      startButton.disabled = true;

      document.body.classList.add(
        "leaving"
      );

      setTimeout(
        function () {
          window.location.href =
            "character.html";
        },
        1100
      );
    }

    window.addEventListener(
      "load",
      function () {
        const savedLanguage =
          localStorage.getItem(
            "bibleKidsLanguage"
          );

        if (
          savedLanguage === "en" ||
          savedLanguage === "zh-HK"
        ) {
          chooseLanguage(
            savedLanguage
          );
        }
      }
    );
  </script>

</body>

</html>
