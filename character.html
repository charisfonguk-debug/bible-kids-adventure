<!DOCTYPE html>
<html lang="zh-HK">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <title>Create Your Character | Bible Kids Adventure</title>

  <style>
    /* ========================================
       基本設定
    ======================================== */

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;

      overflow-x: hidden;

      font-family:
        "Trebuchet MS",
        Arial,
        "Noto Sans TC",
        "Microsoft JhengHei",
        sans-serif;

      background-color: #7b9968;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    /* ========================================
       頁面背景
    ======================================== */

    .page {
      position: relative;

      width: 100%;
      min-height: 100vh;
      min-height: 100svh;

      display: flex;
      align-items: center;
      justify-content: center;

      padding:
        max(18px, env(safe-area-inset-top))
        max(18px, env(safe-area-inset-right))
        max(18px, env(safe-area-inset-bottom))
        max(18px, env(safe-area-inset-left));

      background-image:
        linear-gradient(
          rgba(32, 57, 34, 0.27),
          rgba(52, 67, 37, 0.28)
        ),
        url("images/home-background.png");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* ========================================
       整個角色建立器
    ======================================== */

    .creator-shell {
      position: relative;
      z-index: 2;

      width: min(97vw, 1400px);
      min-height: min(94vh, 900px);

      display: grid;
      grid-template-rows:
        auto
        minmax(0, 1fr)
        auto;

      border: 8px solid #4c2b15;

      border-radius:
        25px 17px 28px 19px;

      background:
        linear-gradient(
          180deg,
          #9b6030,
          #653919
        );

      box-shadow:
        0 12px 0 #321c0e,
        0 28px 55px rgba(25, 17, 10, 0.43),
        inset 0 3px 0 rgba(255, 228, 174, 0.24);

      overflow: hidden;
    }

    /* ========================================
       頂部木框
    ======================================== */

    .top-wood {
      display: grid;
      grid-template-columns:
        150px
        minmax(0, 1fr)
        150px;

      align-items: center;

      min-height: 86px;

      padding:
        14px
        clamp(18px, 3vw, 34px);

      border-bottom:
        7px solid #482712;

      background:
        repeating-linear-gradient(
          3deg,
          rgba(255, 232, 182, 0.045) 0,
          rgba(255, 232, 182, 0.045) 2px,
          transparent 3px,
          transparent 16px
        ),
        linear-gradient(
          180deg,
          #b4743b,
          #7e4b23
        );

      box-shadow:
        inset 0 3px 0 rgba(255, 225, 170, 0.25),
        inset 0 -4px 0 rgba(68, 34, 14, 0.3);
    }

    .brand {
      justify-self: start;

      padding:
        9px
        14px
        10px;

      border: 3px solid #472713;

      border-radius:
        14px 10px 16px 11px;

      background:
        linear-gradient(
          180deg,
          #9c602e,
          #693919
        );

      box-shadow:
        0 4px 0 #3a200f;

      text-align: center;

      transform: rotate(-1deg);
    }

    .brand-small {
      display: block;

      color: #fff0c7;

      font-size: 10px;
      font-weight: 900;
      letter-spacing: 2px;
      line-height: 1;
    }

    .brand-large {
      display: block;

      margin-top: 4px;

      color: #ffd66b;

      font-size: 20px;
      font-weight: 900;
      line-height: 1;

      text-shadow:
        1px 2px 0 #47240f;
    }

    .top-title {
      margin: 0;

      color: #fff0c9;

      font-size:
        clamp(27px, 4vw, 44px);

      font-weight: 900;
      line-height: 1;

      text-align: center;

      text-shadow:
        2px 3px 0 #472612;
    }

    /* ========================================
       中間區域
    ======================================== */

    .main-area {
      display: grid;
      grid-template-columns:
        minmax(330px, 0.86fr)
        minmax(500px, 1.34fr);

      min-height: 0;
    }

    /* ========================================
       左邊角色預覽
    ======================================== */

    .preview-side {
      position: relative;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      min-width: 0;

      padding:
        clamp(22px, 3vw, 40px);

      border-right:
        7px solid #503019;

      overflow: hidden;

      background-image:
        linear-gradient(
          rgba(235, 244, 218, 0.1),
          rgba(55, 84, 46, 0.25)
        ),
        url("images/home-background.png");

      background-size: cover;
      background-position: center;
    }

    .preview-side::before {
      content: "";

      position: absolute;
      inset: 0;

      background:
        radial-gradient(
          circle at 50% 42%,
          rgba(255, 252, 220, 0.54),
          rgba(123, 154, 96, 0.17) 52%,
          rgba(43, 70, 40, 0.31)
        );

      pointer-events: none;
    }

    .preview-title {
      position: relative;
      z-index: 4;

      margin:
        0
        0
        16px;

      padding:
        8px
        19px;

      border: 3px solid #523319;
      border-radius: 999px;

      background:
        rgba(255, 243, 203, 0.95);

      box-shadow:
        0 5px 0 #462914;

      color: #53351e;

      font-size:
        clamp(15px, 2vw, 19px);

      font-weight: 900;
    }

    .avatar-stage {
      position: relative;
      z-index: 3;

      display: flex;
      align-items: flex-end;
      justify-content: center;

      width: min(100%, 430px);
      min-height: 475px;

      border: 5px solid rgba(76, 46, 22, 0.84);

      border-radius:
        32px 22px 35px 24px;

      background:
        radial-gradient(
          circle at 50% 33%,
          rgba(255, 255, 237, 0.96),
          rgba(196, 223, 161, 0.84) 55%,
          rgba(89, 139, 74, 0.88)
        );

      box-shadow:
        0 9px 0 rgba(66, 38, 17, 0.88),
        0 18px 34px rgba(36, 25, 14, 0.28),
        inset 0 3px 0 rgba(255, 255, 255, 0.65);

      overflow: hidden;

      transition:
        min-height 0.3s ease;
    }

    .avatar-stage::before {
      content: "";

      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -65px;

      height: 150px;

      border-radius: 50%;

      background:
        linear-gradient(
          rgba(76, 121, 62, 0.73),
          rgba(55, 95, 47, 0.91)
        );

      box-shadow:
        inset 0 5px 0 rgba(171, 205, 132, 0.32);
    }

    .avatar-glow {
      position: absolute;
      top: 32px;
      left: 50%;

      width: 300px;
      height: 300px;

      border-radius: 50%;

      background:
        radial-gradient(
          circle,
          rgba(255, 249, 194, 0.56),
          transparent 68%
        );

      transform:
        translateX(-50%);
    }

    .avatar-image {
      position: relative;
      z-index: 3;

      display: block;

      width: min(98%, 420px);
      height: auto;

      margin-bottom: -5px;

      object-fit: contain;

      filter:
        drop-shadow(
          0 12px 8px
          rgba(51, 38, 23, 0.23)
        );

      transition:
        opacity 0.2s ease,
        width 0.3s ease,
        transform 0.3s ease,
        margin 0.3s ease;
    }

    .avatar-image.loading {
      opacity: 0.36;
    }

    /* ========================================
       頭部放大模式

       第 2、3、4 步：
       膚色、髮型、髮色
    ======================================== */

    .avatar-stage.focus-head {
      align-items: flex-start;
    }

    .avatar-stage.focus-head .avatar-image {
      width: 150%;
      max-width: none;

      margin-top: -25px;
      margin-bottom: -190px;

      transform:
        scale(1.08);

      transform-origin:
        center top;
    }

    .avatar-stage.focus-head .avatar-glow {
      top: 4px;

      width: 350px;
      height: 350px;
    }

    .focus-label {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 6;

      display: none;

      padding:
        6px
        11px;

      border: 2px solid #57351a;
      border-radius: 999px;

      background:
        rgba(255, 245, 207, 0.94);

      color: #58381f;

      font-size: 12px;
      font-weight: 900;

      box-shadow:
        0 3px 0 #4b2d16;
    }

    .avatar-stage.focus-head .focus-label {
      display: block;
    }

    .avatar-error {
      position: absolute;
      z-index: 7;

      display: none;

      width: 76%;

      padding: 16px;

      border-radius: 14px;

      background:
        rgba(255, 246, 214, 0.95);

      color: #57371f;

      font-weight: 900;
      line-height: 1.45;

      text-align: center;
    }

    .avatar-error.visible {
      display: block;
    }

    .character-name {
      position: relative;
      z-index: 4;

      min-height: 39px;

      margin:
        19px
        0
        0;

      padding:
        7px
        20px;

      border: 3px solid #4e2f17;
      border-radius: 999px;

      background:
        rgba(255, 242, 201, 0.96);

      box-shadow:
        0 5px 0 #442814;

      color: #54331c;

      font-size:
        clamp(21px, 3vw, 29px);

      font-weight: 900;
      line-height: 1;
    }

    /* ========================================
       右邊問題區
    ======================================== */

    .question-side {
      display: flex;
      align-items: center;
      justify-content: center;

      min-width: 0;

      padding:
        clamp(24px, 4vw, 45px);

      background:
        linear-gradient(
          140deg,
          rgba(124, 76, 36, 0.83),
          rgba(90, 49, 23, 0.93)
        );
    }

    .parchment {
      position: relative;

      width: min(100%, 760px);
      min-height: 510px;

      display: flex;
      flex-direction: column;

      padding:
        clamp(35px, 5vw, 54px)
        clamp(24px, 5vw, 54px)
        34px;

      border:
        3px solid rgba(90, 55, 25, 0.7);

      border-radius:
        12px 7px 15px 9px;

      background:
        linear-gradient(
          145deg,
          #fff4cf,
          #f5dfaa 50%,
          #ecd095
        );

      box-shadow:
        0 9px 0 rgba(59, 35, 16, 0.68),
        0 20px 38px rgba(33, 22, 13, 0.33),
        inset 0 2px 0 rgba(255, 255, 255, 0.76);

      overflow: hidden;
    }

    .parchment::before {
      content: "";

      position: absolute;
      inset: 0;

      opacity: 0.21;

      background:
        repeating-linear-gradient(
          3deg,
          rgba(116, 72, 33, 0.09) 0,
          rgba(116, 72, 33, 0.09) 1px,
          transparent 2px,
          transparent 11px
        );

      pointer-events: none;
    }

    .nail {
      position: absolute;
      z-index: 5;

      width: 21px;
      height: 21px;

      border: 3px solid #474137;
      border-radius: 50%;

      background:
        radial-gradient(
          circle at 35% 30%,
          #e5e6e0,
          #8e968f 55%,
          #4c504b
        );

      box-shadow:
        0 3px 4px rgba(42, 30, 18, 0.45);
    }

    .nail-top-left {
      top: 17px;
      left: 18px;
    }

    .nail-top-right {
      top: 17px;
      right: 18px;
    }

    .nail-bottom-left {
      bottom: 17px;
      left: 18px;
    }

    .nail-bottom-right {
      right: 18px;
      bottom: 17px;
    }

    .question-heading {
      position: relative;
      z-index: 3;

      margin: 0;

      color: #a34116;

      font-size:
        clamp(29px, 4.5vw, 47px);

      font-weight: 900;
      line-height: 1.1;

      text-align: center;

      text-shadow:
        1px 2px 0
        rgba(255, 238, 181, 0.86);
    }

    .heading-line {
      position: relative;
      z-index: 3;

      width: min(90%, 510px);
      height: 4px;

      margin:
        17px
        auto
        20px;

      border-radius: 999px;

      background:
        linear-gradient(
          90deg,
          transparent,
          #936331 20%,
          #936331 80%,
          transparent
        );
    }

    .question-help {
      position: relative;
      z-index: 3;

      max-width: 590px;

      margin:
        0
        auto
        23px;

      color: #685036;

      font-size:
        clamp(14px, 2vw, 17px);

      font-weight: 800;
      line-height: 1.45;

      text-align: center;
    }

    .choices {
      position: relative;
      z-index: 3;

      display: grid;
      grid-template-columns:
        repeat(2, minmax(0, 1fr));

      gap: 17px;

      width: 100%;
      max-width: 650px;

      margin: auto;
    }

    /* ========================================
       圖像選項
    ======================================== */

    .choice-card {
      position: relative;

      min-width: 0;
      min-height: 156px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      padding:
        13px
        11px
        14px;

      border: 4px solid #68401f;

      border-radius:
        17px 12px 19px 13px;

      background:
        linear-gradient(
          145deg,
          rgba(255, 252, 231, 0.99),
          rgba(230, 197, 126, 0.97)
        );

      box-shadow:
        0 6px 0 #513018,
        0 12px 20px rgba(52, 36, 20, 0.2);

      color: #49311d;

      font-weight: 900;

      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        filter 0.18s ease;
    }

    .choice-card:hover {
      transform:
        translateY(-5px);

      box-shadow:
        0 11px 0 #513018,
        0 17px 25px rgba(52, 36, 20, 0.24);

      filter: brightness(1.04);
    }

    .choice-card:active {
      transform:
        translateY(2px);

      box-shadow:
        0 3px 0 #513018;
    }

    .choice-card.selected {
      border-color: #406124;

      outline:
        5px solid rgba(119, 165, 70, 0.63);

      outline-offset: 3px;

      background:
        linear-gradient(
          145deg,
          #fffdeb,
          #ddea9a
        );

      box-shadow:
        0 7px 0 #3e5b28,
        0 0 20px rgba(105, 147, 62, 0.41);
    }

    .choice-card.selected::after {
      content: "✓";

      position: absolute;
      top: -13px;
      right: -11px;

      display: flex;
      align-items: center;
      justify-content: center;

      width: 37px;
      height: 37px;

      border: 3px solid #fff8d8;
      border-radius: 50%;

      background: #538033;

      color: white;

      font-size: 22px;
      font-weight: 900;

      box-shadow:
        0 3px 0 #334e20;
    }

    .choice-image-box {
      width: 118px;
      height: 118px;

      display: flex;
      align-items: flex-end;
      justify-content: center;

      margin-bottom: 8px;

      border:
        3px solid rgba(92, 57, 28, 0.45);

      border-radius: 16px;

      background:
        radial-gradient(
          circle at center,
          #ffffea,
          #b9dc97
        );

      overflow: hidden;
    }

    .choice-image {
      display: block;

      width: 112px;
      height: 112px;

      object-fit: contain;
    }

    .choice-label {
      display: block;

      font-size:
        clamp(15px, 2vw, 18px);

      font-weight: 900;
      line-height: 1.2;

      text-align: center;
    }

    /* ========================================
       髮型選項放大

       令長髮同短髮更易分辨
    ======================================== */

    .hair-choice .choice-image-box {
      align-items: flex-start;
    }

    .hair-choice .choice-image {
      width: 155px;
      height: 155px;
      max-width: none;

      transform:
        translateY(-7px)
        scale(1.08);

      transform-origin:
        center top;
    }

    /* ========================================
       緊密三欄選項
    ======================================== */

    .choices.compact {
      grid-template-columns:
        repeat(3, minmax(0, 1fr));

      gap: 14px;
    }

    .choices.compact .choice-card {
      min-height: 147px;

      padding:
        10px
        7px
        12px;
    }

    .choices.compact .choice-image-box {
      width: 95px;
      height: 95px;
    }

    .choices.compact .choice-image {
      width: 92px;
      height: 92px;
    }

    .choices.compact .hair-choice .choice-image {
      width: 138px;
      height: 138px;

      transform:
        translateY(-6px)
        scale(1.06);
    }

    .choices.compact .choice-label {
      font-size: 14px;
    }

    /* ========================================
       顏色選項
    ======================================== */

    .choices.colour-choices {
      grid-template-columns:
        repeat(3, minmax(0, 1fr));

      max-width: 520px;
    }

    .colour-choice {
      position: relative;

      min-height: 101px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      gap: 10px;

      padding:
        12px
        8px;

      border: 4px solid #67411f;

      border-radius:
        16px 11px 18px 12px;

      background:
        rgba(255, 248, 220, 0.94);

      box-shadow:
        0 6px 0 #513018;

      color: #4b321e;

      font-weight: 900;

      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease;
    }

    .colour-choice:hover {
      transform:
        translateY(-4px);

      box-shadow:
        0 10px 0 #513018;
    }

    .colour-choice.selected {
      border-color: #406124;

      outline:
        5px solid rgba(119, 165, 70, 0.63);

      outline-offset: 3px;

      background: #ffffe6;
    }

    .colour-choice.selected::after {
      content: "✓";

      position: absolute;
      top: 7px;
      right: 8px;

      display: flex;
      align-items: center;
      justify-content: center;

      width: 27px;
      height: 27px;

      border-radius: 50%;

      background: #517a33;

      color: white;

      font-size: 18px;
      font-weight: 900;
    }

    .colour-circle {
      width: 55px;
      height: 55px;

      border: 5px solid #fff9e1;
      border-radius: 50%;

      box-shadow:
        0 0 0 3px #5c3a20,
        0 5px 0 rgba(72, 43, 20, 0.5);
    }

    .colour-label {
      font-size: 14px;
      line-height: 1.15;
    }

    /* ========================================
       名字輸入
    ======================================== */

    .name-step {
      position: relative;
      z-index: 3;

      width: min(100%, 520px);

      margin: auto;
    }

    .name-label {
      display: block;

      margin-bottom: 13px;

      color: #593b24;

      font-size: 18px;
      font-weight: 900;

      text-align: center;
    }

    .name-input {
      width: 100%;
      min-height: 67px;

      padding:
        14px
        19px;

      border: 4px solid #66411f;

      border-radius:
        17px 12px 19px 13px;

      outline: none;

      background:
        rgba(255, 254, 235, 0.99);

      box-shadow:
        inset 0 4px 6px rgba(93, 57, 26, 0.13),
        0 6px 0 #513018;

      color: #442d1c;

      font-size: 23px;
      font-weight: 900;

      text-align: center;

      transition:
        border-color 0.18s ease,
        box-shadow 0.18s ease;
    }

    .name-input:focus {
      border-color: #4e7130;

      box-shadow:
        inset 0 4px 6px rgba(93, 57, 26, 0.13),
        0 6px 0 #3a5625,
        0 0 0 5px rgba(113, 155, 67, 0.3);
    }

    .name-note {
      margin:
        17px
        0
        0;

      color: #6c5337;

      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;

      text-align: center;
    }

    /* ========================================
       底部導航
    ======================================== */

    .navigation-bar {
      display: grid;
      grid-template-columns:
        minmax(130px, 1fr)
        auto
        minmax(130px, 1fr);

      align-items: center;

      min-height: 86px;

      padding:
        14px
        clamp(16px, 3vw, 35px);

      border-top:
        7px solid #482611;

      background:
        repeating-linear-gradient(
          2deg,
          rgba(255, 230, 176, 0.045) 0,
          rgba(255, 230, 176, 0.045) 2px,
          transparent 3px,
          transparent 15px
        ),
        linear-gradient(
          180deg,
          #9c5e2e,
          #703f1d
        );

      box-shadow:
        inset 0 3px 0 rgba(255, 223, 166, 0.22);
    }

    .nav-button {
      min-width: 145px;
      min-height: 52px;

      padding:
        11px
        19px;

      border: 4px solid #472914;

      border-radius:
        15px 10px 17px 11px;

      background:
        linear-gradient(
          to bottom,
          #f2c76c,
          #ae6c2d
        );

      box-shadow:
        0 6px 0 #3b2110;

      color: #fff4d5;

      font-size:
        clamp(15px, 2vw, 19px);

      font-weight: 900;

      text-shadow:
        1px 2px 0 rgba(66, 34, 14, 0.75);

      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        filter 0.18s ease;
    }

    .previous-button {
      justify-self: start;
    }

    .next-button {
      justify-self: end;
    }

    .nav-button:hover:not(:disabled) {
      transform:
        translateY(-4px);

      box-shadow:
        0 10px 0 #3b2110;

      filter: brightness(1.06);
    }

    .nav-button:active:not(:disabled) {
      transform:
        translateY(2px);

      box-shadow:
        0 3px 0 #3b2110;
    }

    .nav-button:disabled {
      opacity: 0.44;

      cursor: not-allowed;

      filter:

      transform:

        0 0 8px rgba(255, 246, 179, 0.82);

       頁面轉場
    ======================================== */

      content: "";

      position: fixed;
      inset: 0;
      z-index: 100;

      background:
        radial-gradient(

          rgba(255, 255, 234, 0.99),

      opacity: 0;

      transition:
        opacity 0.85s ease;
    }

    body.leaving::after {
      opacity: 1;
    }

    body.leaving .creator-shell {
      animation:
        leavePage
        0.85s ease
        forwards;
    }

    @keyframes leavePage {
      to {
        transform:
          scale(1.06);

        filter:
          brightness(1.18)
          blur(2px);
      }
    }

    /* ========================================
       建立 DiceBear 角色 URL
    ======================================== */

    function buildAvatarUrl(
      overrides = {}
    ) {
      const avatarState = {
        ...state,
        ...overrides
      };

      const seed =
        avatarState.gender === "girl"
          ? "bible-kids-girl"
          : "bible-kids-boy";

      const url =
        new URL(
          "https://api.dicebear.com/10.x/avataaars/svg"
        );

      url.searchParams.set(
        "seed",
        seed
      );

      url.searchParams.set(
        "topVariant",
        avatarState.topVariant
      );

      url.searchParams.set(
        "hairColor",
        avatarState.hairColor
      );

      url.searchParams.set(
        "skinColor",
        avatarState.skinColor
      );

      url.searchParams.set(
        "clothesVariant",
        avatarState.clothesVariant
      );

      url.searchParams.set(
        "clothesColor",
        avatarState.clothesColor
      );

      url.searchParams.set(
        "eyesVariant",
        "happy"
      );

      url.searchParams.set(
        "eyebrowsVariant",
        "raisedExcitedNatural"
      );

      url.searchParams.set(
        "mouthVariant",
        "smile"
      );

      url.searchParams.set(
        "facialHairProbability",
        "0"
      );

      url.searchParams.set(
        "accessoriesProbability",
        "0"
      );

      url.searchParams.set(
        "scale",
        "91"
      );

      url.searchParams.set(
        "translateY",
        "5"
      );

      if (
        avatarState.clothesVariant ===
        "graphicShirt"
      ) {
        url.searchParams.set(
          "clothesGraphicVariant",
          "bear"
        );
      }

      return url.toString();
    }

        );

      imageBox.className =
        "choice-image-box";

      const image =
        document.createElement(
          "img"
        );

      image.className =
        "choice-image";

      image.src =
        imageUrl;

      image.alt =
        "";

      image.loading =
        "lazy";

      const labelElement =
        document.createElement(
          "span"
        );

      labelElement.className =
        "choice-label";

      labelElement.textContent =
        label;

      imageBox.appendChild(
        image
      );

      button.appendChild(
        imageBox
      );

      button.appendChild(
        labelElement
      );

      return button;
    }

    /* ========================================
       建立顏色選項
    ======================================== */

    function createColourChoice(
      value,
      label,
      isSelected
    ) {
      const button =
        document.createElement(
          "button"
        );

      button.type =
        "button";

      button.className =
        "colour-choice" +
        (
          isSelected
            ? " selected"
            : ""
        );

      button.dataset.value =
        value;

      button.setAttribute(
        "aria-pressed",
        isSelected
          ? "true"
          : "false"
      );

      const circle =
        document.createElement(
          "span"
        );

      circle.className =
        "colour-circle";

      circle.style.backgroundColor =
        "#" + value;

      const labelElement =
        document.createElement(
          "span"
        );

      labelElement.className =
        "colour-label";

      labelElement.textContent =
        label;

      button.appendChild(
        circle
      );

      button.appendChild(
        labelElement
      );

      return button;
    }

    /* ========================================
       第 1 步：男仔／女仔
    ======================================== */

    function renderGenderStep() {
      choices.className =
        "choices";

      genderOptions.forEach(
        function (option) {
          const button =
            createImageChoice(
              option.value,
              getText().labels[
                option.labelKey
              ],
              buildAvatarUrl({
                gender:
                  option.value,

                topVariant:
                  option.topVariant
              }),
              state.gender ===
                option.value
            );

          button.addEventListener(
            "click",
            function () {
              state.gender =
                option.value;

              state.topVariant =
                option.topVariant;

              saveCharacter();
              updateAvatar();
              renderStep();
            }
          );

          choices.appendChild(
            button
          );
        }
      );
    }

    /* ========================================
       第 2 步：膚色
    ======================================== */

    function renderSkinStep() {
      choices.className =
        "choices colour-choices";

      skinOptions.forEach(
        function (option) {
          const button =
            createColourChoice(
              option.value,
              getText().labels[
                option.labelKey
              ],
              state.skinColor ===
                option.value
            );

          button.addEventListener(
            "click",
            function () {
              state.skinColor =
                option.value;

              saveCharacter();
              updateAvatar();
              renderStep();
            }
          );

          choices.appendChild(
            button
          );
        }
      );
    }

    /* ========================================
       第 3 步：髮型
    ======================================== */

    function renderHairStyleStep() {
      choices.className =
        "choices compact";

      hairStyleOptions.forEach(
        function (option) {
          const button =
            createImageChoice(
              option.value,
              getText().labels[
                option.labelKey
              ],
              buildAvatarUrl({
                topVariant:
                  option.value
              }),
              state.topVariant ===
                option.value
            );

          /*
            髮型選項使用放大模式
          */

          button.classList.add(
            "hair-choice"
          );

          button.addEventListener(
            "click",
            function () {
              state.topVariant =
                option.value;

              saveCharacter();
              updateAvatar();
              renderStep();
            }
          );

          choices.appendChild(
            button
          );
        }
      );
    }

    /* ========================================
       第 4 步：髮色
    ======================================== */

    function renderHairColourStep() {
      choices.className =
        "choices colour-choices";

      hairColourOptions.forEach(
        function (option) {
          const button =
            createColourChoice(
              option.value,
              getText().labels[
                option.labelKey
              ],
              state.hairColor ===
                option.value
            );

          button.addEventListener(
            "click",
            function () {
              state.hairColor =
                option.value;

              saveCharacter();
              updateAvatar();
              renderStep();
            }
          );

          choices.appendChild(
            button
          );
        }
      );
    }

    /* ========================================
       第 5 步：衣服
    ======================================== */

    function renderClothesStep() {
      choices.className =
        "choices compact";

      clothesStyleOptions.forEach(
        function (option) {
          const button =
            createImageChoice(
              option.value,
              getText().labels[
                option.labelKey
              ],
              buildAvatarUrl({
                clothesVariant:
                  option.value
              }),
              state.clothesVariant ===
                option.value
            );

          button.addEventListener(
            "click",
            function () {
              state.clothesVariant =
                option.value;

              saveCharacter();
              updateAvatar();
              renderStep();
            }
          );

          choices.appendChild(
            button
          );
        }
      );
    }

    /* ========================================
       第 6 步：衣服顏色
    ======================================== */

    function renderClothesColourStep() {
      choices.className =
        "choices colour-choices";

      clothesColourOptions.forEach(
        function (option) {
          const button =
            createColourChoice(
              option.value,
              getText().labels[
                option.labelKey
              ],
              state.clothesColor ===
                option.value
            );

          button.addEventListener(
            "click",
            function () {
              state.clothesColor =
                option.value;

              saveCharacter();
              updateAvatar();
              renderStep();
            }
          );

          choices.appendChild(
            button
          );
        }
      );
    }

    /* ========================================
       第 7 步：名字
    ======================================== */

    function renderNameStep() {
      choices.className =
        "";

      const wrapper =
        document.createElement(
          "div"
        );

      wrapper.className =
        "name-step";

      const label =
        document.createElement(
          "label"
        );

      label.className =
        "name-label";

      label.htmlFor =
        "playerName";

      label.textContent =
        getText().labels.nameLabel;

      const input =
        document.createElement(
          "input"
        );

      input.type =
        "text";

      input.id =
        "playerName";

      input.className =
        "name-input";

      input.maxLength =
        18;

      input.autocomplete =
        "off";

      input.placeholder =
        getText().labels
          .namePlaceholder;

      input.value =
        state.name;

      const note =
        document.createElement(
          "p"
        );

      note.className =
        "name-note";

      note.textContent =
        getText().labels.nameNote;

      input.addEventListener(
        "input",
        function () {
          state.name =
            input.value
              .replace(
                /[<>]/g,
                ""
              )
              .slice(
                0,
                18
              );

          if (
            input.value !==
            state.name
          ) {
            input.value =
              state.name;
          }

          saveCharacter();
          updateAvatar();
          updateNavigation();
        }
      );

      input.addEventListener(
        "keydown",
        function (event) {
          if (
            event.key === "Enter" &&
            isCurrentStepComplete()
          ) {
            finishCharacter();
          }
        }
      );

      wrapper.appendChild(
        label
      );

      wrapper.appendChild(
        input
      );

      wrapper.appendChild(
        note
      );

      choices.appendChild(
        wrapper
      );

      setTimeout(
        function () {
          input.focus();
        },
        60
      );
    }

    /* ========================================
       顯示目前步驟
    ======================================== */

    function renderStep() {
      /*
        第 2、3、4 步使用頭部放大：
        膚色、髮型、髮色
      */

      const shouldFocusHead =
        currentStep === 1 ||
        currentStep === 2 ||
        currentStep === 3;

      avatarStage.classList.toggle(
        "focus-head",
        shouldFocusHead
      );

      const question =
        getText().questions[
          currentStep
        ];

      questionHeading.textContent =
        question.title;

      questionHelp.textContent =
        question.help;

      choices.innerHTML =
        "";

      if (currentStep === 0) {
        renderGenderStep();
      }

      if (currentStep === 1) {
        renderSkinStep();
      }

      if (currentStep === 2) {
        renderHairStyleStep();
      }

      if (currentStep === 3) {
        renderHairColourStep();
      }

      if (currentStep === 4) {
        renderClothesStep();
      }

      if (currentStep === 5) {
        renderClothesColourStep();
      }

      if (currentStep === 6) {
        renderNameStep();
      }

      updateNavigation();
      updateProgress();
    }

    /* ========================================
       檢查步驟
    ======================================== */

    function isCurrentStepComplete() {
      if (currentStep === 0) {
        return state.gender !== "";
      }

      if (currentStep === 6) {
        return (
          state.name.trim().length > 0
        );
      }

      return true;
    }

    /* ========================================
       更新導航
    ======================================== */

    function updateNavigation() {
      previousButton.textContent =
        getText().previous;

      nextButton.textContent =
        currentStep ===
        totalSteps - 1
          ? getText().finish
          : getText().next;

      nextButton.disabled =
        !isCurrentStepComplete();
    }

    /* ========================================
       更新進度
    ======================================== */

    function updateProgress() {
      if (
        getLanguage() === "zh-HK"
      ) {
        progressText.textContent =
          "第 " +
          (currentStep + 1) +
          "／" +
          totalSteps +
          " 步";
      } else {
        progressText.textContent =
          "Step " +
          (currentStep + 1) +
          " / " +
          totalSteps;
      }

      progressDots.innerHTML =
        "";

      for (
        let index = 0;
        index < totalSteps;
        index += 1
      ) {
        const dot =
          document.createElement(
            "span"
          );

        dot.className =
          "progress-dot";

        if (index < currentStep) {
          dot.classList.add(
            "complete"
          );
        }

        if (index === currentStep) {
          dot.classList.add(
            "current"
          );
        }

        progressDots.appendChild(
          dot
        );
      }
    }

    /* ========================================
       上一步
    ======================================== */

    previousButton.addEventListener(
      "click",
      function () {
        if (currentStep === 0) {
          window.location.href =
            "index.html";

          return;
        }

        currentStep -= 1;

        renderStep();
      }
    );

    /* ========================================
       下一步
    ======================================== */

    nextButton.addEventListener(
      "click",
      function () {
        if (
          !isCurrentStepComplete()
        ) {
          return;
        }

        if (
          currentStep <
          totalSteps - 1
        ) {
          currentStep += 1;

          renderStep();

          return;
        }

        finishCharacter();
      }
    );

    /* ========================================
       儲存角色
    ======================================== */

    function saveCharacter() {
      localStorage.setItem(
        "bibleKidsCharacter",
        JSON.stringify(state)
      );

      localStorage.setItem(
        "bibleKidsGender",
        state.gender
      );

      localStorage.setItem(
        "bibleKidsSkinColor",
        state.skinColor
      );

      localStorage.setItem(
        "bibleKidsHairStyle",
        state.topVariant
      );

      localStorage.setItem(
        "bibleKidsHairColour",
        state.hairColor
      );

      localStorage.setItem(
        "bibleKidsOutfit",
        state.clothesVariant
      );

      localStorage.setItem(
        "bibleKidsClothesColour",
        state.clothesColor
      );

      localStorage.setItem(
        "bibleKidsPlayerName",
        state.name.trim()
      );

      localStorage.setItem(
        "bibleKidsAvatarUrl",
        buildAvatarUrl()
      );
    }

    /* ========================================
       完成
    ======================================== */

    function finishCharacter() {
      if (
        state.gender === "" ||
        state.name.trim() === ""
      ) {
        return;
      }

      saveCharacter();

      nextButton.disabled =
        true;

      document.body.classList.add(
        "leaving"
      );

      setTimeout(
        function () {
          window.location.href =
            "map.html";
        },
        850
      );
    }

    /* ========================================
       載入角色
    ======================================== */

    function loadCharacter() {
      const saved =
        localStorage.getItem(
          "bibleKidsCharacter"
        );

      if (!saved) {
        return;
      }

      try {
        const savedState =
          JSON.parse(saved);

        if (
          savedState &&
          typeof savedState ===
            "object"
        ) {
          Object.assign(
            state,
            savedState
          );
        }
      } catch (error) {
        console.warn(
          "Could not load saved character.",
          error
        );
      }
    }

    /* ========================================
       套用語言
    ======================================== */

    function applyLanguage() {
      const language =
        getLanguage();

      const languageText =
        text[language];

      document.documentElement.lang =
        language;

      document.getElementById(
        "topTitle"
      ).textContent =
        languageText.topTitle;

      document.getElementById(
        "previewTitle"
      ).textContent =
        languageText.previewTitle;

      document.getElementById(
        "focusLabel"
      ).textContent =
        languageText.focusLabel;

      avatarError.textContent =
        languageText.avatarError;
    }

    /* ========================================
       啟動
    ======================================== */

    window.addEventListener(
      "load",
      function () {
        loadCharacter();
        applyLanguage();
        updateAvatar();
        renderStep();
      }
    );
  </script>

</body>

</html>
