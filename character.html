<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Choose Your Character</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background-color: #f3dfae;
      color: #3f2f22;
      text-align: center;
    }

    main {
      width: min(90%, 850px);
    }

    h1 {
      font-size: clamp(36px, 7vw, 64px);
      margin-bottom: 10px;
    }

    .characters {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 24px;
      margin-top: 40px;
    }

    .character-card {
      width: 190px;
      padding: 20px;
      border: 4px solid #5c4028;
      border-radius: 18px;
      background-color: #fff4d4;
      box-shadow: 7px 8px 0 #5c4028;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .character-card:hover {
      transform: translateY(-8px);
    }

    .character-picture {
      height: 210px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 15px;
      border-radius: 14px;
      background-color: #cde5d2;
      font-size: 80px;
    }
  </style>
</head>

<body>

  <main>
    <h1>Choose Your Character</h1>
    <p>選擇你嘅探險角色</p>

    <section class="characters">

      <div class="character-card">
        <div class="character-picture">🧒</div>
        <strong>Explorer One</strong>
      </div>

      <div class="character-card">
        <div class="character-picture">🧑</div>
        <strong>Explorer Two</strong>
      </div>

      <div class="character-card">
        <div class="character-picture">👧</div>
        <strong>Explorer Three</strong>
      </div>

    </section>
  </main>

</body>

</html>
